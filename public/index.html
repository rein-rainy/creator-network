<html lang="ja">

<title>Creator Network</title>

</head>
<body data-theme="dark">

    </svg>
  </div>
  <div class="sep"></div>
  <button id="search-mode-btn" title="検索モード切替：フィルター / 移動" style="
    width:32px;height:32px;flex-shrink:0;
    background:var(--bg3);border:1.5px solid transparent;color:var(--text-2);
    border-radius:var(--r-sm);cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:all .18s;padding:0;">
    <!-- filter icon (default) -->
    <svg id="smb-icon-filter" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/>
    </svg>
    <!-- navigate icon (hidden by default) -->
    <svg id="smb-icon-nav" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      <line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/>
    </svg>
  </button>
  <input type="text" id="search-box" placeholder="検索...">
  <div id="tag-filter-wrap">
    <button id="tag-filter-btn" title="タグで絞り込み">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
      </svg>
    </button>
    <div id="tag-filter-dropdown"></div>
  </div>
  <div class="topbar-right">
    <div class="sep"></div>
    <label class="tog-wrap" id="depth-tog" title="関連人物の別作品も展開">
      <div class="tog"></div><span>2次展開</span>
    </label>
    <div class="sep"></div>
    <button class="icon-btn" id="filter-modal-btn" title="表示フィルター" style="font-size:16px;display:none">⊞</button>
    <button class="icon-btn" id="theme-btn" title="ダーク/ライト切替">◐</button>
    <button class="icon-btn" id="hidden-btn" title="非表示リスト">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/><line x1="1" y1="1" x2="23" y2="23"/>
      </svg>
    </button>
    <button id="notion-sync-btn" title="Notionから自動取得"><span class="nsb-dot"></span><span>更新</span></button>
  </div>
</div>

<div id="ctx-menu">
  <div class="ctx-item" id="ctx-hide">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0">
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/><line x1="1" y1="1" x2="23" y2="23"/>
    </svg>
    このノードを非表示
  </div>
  <div class="ctx-item" id="ctx-hide-connected">🔗 関連作品ごと非表示</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" id="ctx-open">▶ YouTubeで開く</div>
</div>

<div id="hidden-panel">
  <div class="hp-header">
    <div class="hp-title">非表示リスト <span id="hp-count"></span></div>
    <div><button class="hp-btn" id="hp-restore-all">すべて復元</button></div>
  </div>
  <div id="hp-list"></div>
</div>

<div id="filter-modal">
  <div class="fm-box">
    <button class="fm-close" id="fm-close">✕</button>
    <div class="fm-title">表示フィルター</div>
    <div class="fm-tabs">
      <button class="fm-tab active" id="fm-tab-work">作品</button>
      <button class="fm-tab" id="fm-tab-director">Creator</button>
      <button class="fm-tab" id="fm-tab-artist">Artist</button>
    </div>
    <input class="fm-search" id="fm-search" type="text" placeholder="名前で絞り込み...">
    <div class="fm-list" id="fm-list"></div>
    <div class="fm-footer">
      <span class="fm-count" id="fm-count"></span>
      <button class="fm-close-btn" id="fm-done">完了</button>
    </div>
  </div>
</div>

<div id="filmography-overlay">
  <div id="filmography-modal">
    <div class="fm2-header">
      <div class="fm2-avatar" id="fm2-avatar"></div>
      <div class="fm2-title-wrap">
        <div class="fm2-name" id="fm2-name"></div>
        <div class="fm2-sub" id="fm2-sub"></div>
      </div>
      <button class="fm2-google" id="fm2-google" title="Googleで検索">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
      <button class="fm2-close" id="fm2-close">✕</button>
    </div>
    <div class="fm2-tabs" id="fm2-tabs"></div>
    <div class="fm2-body" id="fm2-body"></div>
  </div>
</div>

<div id="notion-toast"></div>
<div id="graph-loading-overlay">
  <div class="glo-spinner"></div>
  <div class="glo-label">読み込み中…</div>
</div>

<div id="add-creator-dropdown">
  <input type="text" class="acd-search" placeholder="クリエイターを検索...">
  <div class="acd-list"></div>
</div>

<input type="file" id="fi0" accept=".csv" style="display:none">
<svg id="canvas"></svg>

<div id="legend">
  <div class="leg"><div class="ldot" style="background:var(--node-dir)"></div>Creator</div>
  <div class="leg"><div class="ldot" style="background:var(--node-art)"></div>Artist</div>
  <div class="leg"><div class="lline" style="background:var(--link-dir)"></div>制作</div>
  <div class="leg"><div class="lline" style="background:var(--link-art);height:1px"></div>出演</div>
</div>

<div id="stats"></div>

<div id="info-overlay"></div>
<div id="info-panel">
  <div class="ph">
    <div id="ph-avatar" style="display:none;width:40px;height:40px;border-radius:50%;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff"></div>
    <div style="flex:1;min-width:0">
      <div class="ph-type" id="pt"></div>
      <div class="ph-name" id="pn"></div>
    </div>
    <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
      <button class="ph-close" id="pc-notion" title="Notionで開く" style="display:none">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
      </button>
      <button class="ph-close" id="pc-search" title="このクリエイターを検索" style="display:none">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
      <button class="ph-close" id="pc-hide" title="このノードを非表示" style="display:none">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/><line x1="1" y1="1" x2="23" y2="23"/>
        </svg>
      </button>
      <button class="ph-close" id="pc">✕</button>
    </div>
  </div>
  <div id="pc2"></div>
</div>

<script src="/js/core.js"></script>
<script src="/js/filters.js"></script>
<script src="/js/graph.js"></script>
<script src="/js/panel.js"></script>
<script src="/js/imdb.js"></script>
<script src="/js/tag-filter.js"></script>
<script src="/js/avatars.js"></script>
<script src="/js/main.js"></script>
<!-- ── Role Picker Popover ── -->
<div id="role-picker-popover" class="picker-popover">
  <div class="picker-popover-header">
    <span class="picker-popover-label">役職を選択</span>
    <button class="picker-popover-close" id="role-popover-close">✕</button>
  </div>
  <div class="picker-popover-body">
    <div class="role-picker-tags" id="role-popover-tags" style="max-height:180px;overflow-y:auto"></div>
    <button class="cmeta-save-btn" id="role-popover-save" style="height:28px;font-size:12px;width:100%">保存</button>
  </div>
</div>

<!-- ── SNS Picker Popover ── -->
<div id="sns-picker-popover" class="picker-popover">
  <div class="picker-popover-header">
    <span class="picker-popover-label">SNS リンク</span>
    <button class="picker-popover-close" id="sns-popover-close">✕</button>
  </div>
  <div class="picker-popover-body">
    <div class="cmeta-sns-list" id="sns-popover-list"></div>
  </div>
</div>

</body>
</html>
